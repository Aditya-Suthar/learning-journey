    <h2> COOKIE WITH EXPIRY</h2>

    <button onclick = "setCookie()"> Set Cookie </button>
    <button onclick = "getCookie()"> Get Cookie </button>
    <button onclick = "clearOutput()"> Clear </button>

    <p id = "output"></p>

    <script>
        function setCookie()
        {
            let expiryDate = new Date();
            expiryDate.setTime(expiryDate.getTime() + (24*60*60*1000));

            document.cookie = "username = ADITYA; expires = " + expiryDate.toUTCString();

            alert("Cookie Set for 1 day!");
        }

        function getCookie()
        {
            let cookies = document.cookie;

            if (cookies = ""){
                document.getElementById("output").innerHTML = "No cookies found"
            }

            else
            {
                document.getElementById("output").innerHTML = cookies;
            }

        }

    </script>
