<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Validation</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .container {
            width: 350px;
            margin: 80px auto;
            padding: 20px;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        h3 {
            text-align: center;
        }

        input, select {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
        }

        input:focus {
            outline: none;
            border: 2px solid steelblue;
        }

        input:invalid {
            border: 2px solid red;
        }

        input:valid {
            border: 2px solid green;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: steelblue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #2b6cb0;
        }

        .error {
            color: red;
            font-size: 12px;
        }

        .success {
            color: green;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">
    <h3>Registration Form</h3>

    <form onsubmit="return validateForm()">

        Name:<br>
        <input type="text" id="name"
            placeholder="Enter Name"
            pattern="[A-Z][a-zA-Z ]{2,29}"
            required>
        <div class="error" id="nameError"></div>

        Phone:<br>
        <input type="tel" id="phone"
            placeholder="Enter 10 digit number"
            pattern="[6-9][0-9]{9}"
            required>
        <div class="error" id="phoneError"></div>

        Gmail:<br>
        <input type="email" id="email"
            placeholder="Enter gmail"
            pattern="[a-z0-9._%+-]+@gmail\.com"
            required>

        Age:<br>
        <input type="number" id="age" min="18" max="60" required>

        Gender:<br>
        <select required>
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        Password:<br>
        <input type="password" id="password"
            placeholder="Enter password"
            pattern="(?=.*[A-Z])(?=.*[0-9]).{6,}"
            required>

        Confirm Password:<br>
        <input type="password" id="confirmPassword"
            placeholder="Confirm password"
            required>
        <div class="error" id="passError"></div>

        <input type="checkbox" onclick="togglePassword()"> Show Password

        <button type="submit">Submit</button>

        <div class="success" id="successMsg"></div>

    </form>
</div>

<script>
function togglePassword() {
    let p1 = document.getElementById("password");
    let p2 = document.getElementById("confirmPassword");

    if (p1.type === "password") {
        p1.type = "text";
        p2.type = "text";
    } else {
        p1.type = "password";
        p2.type = "password";
    }
}

function validateForm() {
    let pass = document.getElementById("password").value;
    let confirm = document.getElementById("confirmPassword").value;

    if (pass !== confirm) {
        document.getElementById("passError").innerText = "Passwords do not match";
        return false;
    }

    document.getElementById("successMsg").innerText = "Form Submitted Successfully!";
    return false; // stop actual submission for demo
}
</script>

</body>
</html>
